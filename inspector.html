<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDI // Field Evaluation Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .step-pill-active { background-color: #4f46e5; color: #ffffff; border-color: #4f46e5; }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 min-h-screen pb-24">

    <nav class="bg-slate-900 border-b border-slate-800 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-lg font-black text-white">NDI // <span class="text-indigo-400">Inspector Node</span></span>
                <span class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 text-[9px] font-bold px-2 py-0.5 rounded uppercase tracking-widest">Field Active</span>
            </div>
            <span class="text-xs text-slate-500 font-bold">June 2026 Terminal</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 pt-8">
        
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 mb-8 flex items-center justify-between text-xs font-bold shadow-xl">
            <div id="pill-step1" class="step-pill-active border border-slate-700 px-4 py-2 rounded-xl transition-all flex-1 text-center mx-1">1. Vehicle Basics</div>
            <div id="pill-step2" class="bg-slate-950 text-slate-500 border border-slate-900 px-4 py-2 rounded-xl transition-all flex-1 text-center mx-1">2. 140-Pt Checklist</div>
            <div id="pill-step3" class="bg-slate-950 text-slate-500 border border-slate-900 px-4 py-2 rounded-xl transition-all flex-1 text-center mx-1">3. Media Profiles</div>
        </div>

        <form id="inspectionReportForm" class="space-y-6" onsubmit="handleFormSubmissionPipeline(event)">
            
            <div id="formSection-step1" class="form-step-block space-y-6">
                <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 space-y-4">
                    <h3 class="text-base font-bold text-white border-b border-slate-800 pb-3">Identity Parameters Registry</h3>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs font-semibold">
                        <div class="space-y-1.5">
                            <label class="text-slate-400 pl-1 uppercase tracking-wider text-[10px]">Vehicle Custom unique ID (e.g., NDI-T505)</label>
                            <input type="text" id="carId" required placeholder="Must match target unique string" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-slate-400 pl-1 uppercase tracking-wider text-[10px]">Make & Model Name</label>
                            <input type="text" id="carName" required placeholder="e.g., Toyota Fortuner" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-slate-400 pl-1 uppercase tracking-wider text-[10px]">Trim Variant Details</label>
                            <input type="text" id="carVariant" required placeholder="e.g., Sigma Diesel AT" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-slate-400 pl-1 uppercase tracking-wider text-[10px]">Manufacturing Year</label>
                            <input type="number" id="carYear" required placeholder="e.g., 2023" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-slate-400 pl-1 uppercase tracking-wider text-[10px]">Odometer Log (KMs Run)</label>
                            <input type="number" id="carKms" required placeholder="e.g., 31000" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-slate-400 pl-1 uppercase tracking-wider text-[10px]">Registered RTO Location</label>
                            <input type="text" id="carRto" required placeholder="e.g., HR26" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-slate-400 pl-1 uppercase tracking-wider text-[10px]">Fuel Engine Type</label>
                            <select id="carFuel" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500 font-bold">
                                <option value="Diesel">Diesel</option>
                                <option value="Petrol">Petrol</option>
                                <option value="CNG">CNG / Hybrid</option>
                            </select>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-slate-400 pl-1 uppercase tracking-wider text-[10px]">Transmission Box Setup</label>
                            <select id="carTransmission" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500 font-bold">
                                <option value="Automatic">Automatic</option>
                                <option value="Manual">Manual</option>
                            </select>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-slate-400 pl-1 uppercase tracking-wider text-[10px]">Ownership Tier</label>
                            <input type="number" id="carOwners" required placeholder="e.g., 1" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-slate-400 pl-1 uppercase tracking-wider text-[10px]">Exterior Body Color Finish</label>
                            <input type="text" id="carColor" required placeholder="e.g., Pearl White" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500">
                        </div>
                    </div>
                </div>

                <div class="flex justify-end">
                    <button type="button" onclick="navigateWizardStep(2)" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs px-6 py-3.5 rounded-xl transition-all shadow-lg shadow-indigo-600/10 uppercase tracking-wider cursor-pointer">
                        Proceed to 140-Point Checklist →
                    </button>
                </div>
            </div>

            <div id="formSection-step2" class="form-step-block space-y-6 hidden">
                <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 space-y-4">
                    <h3 class="text-base font-bold text-white border-b border-slate-800 pb-3">140-Point Component Health Diagnostics</h3>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs font-semibold">
                        <div class="space-y-1.5">
                            <label class="text-slate-400 pl-1 uppercase tracking-wider text-[10px]">Engine Block & Transmission Status</label>
                            <select id="pdiEngine" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500 font-bold">
                                <option value="Passed">Passed (No blow-by, clean exhaust)</option>
                                <option value="Attention">Attention Required (Minor oil leak / noise)</option>
                            </select>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-slate-400 pl-1 uppercase tracking-wider text-[10px]">Chassis & Structural Pillar State</label>
                            <select id="pdiStructure" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500 font-bold">
                                <option value="Passed">Passed (Original aprons & frame structure)</option>
                                <option value="Attention">Attention Required (Accident alert / refitted panel)</option>
                            </select>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-slate-400 pl-1 uppercase tracking-wider text-[10px]">Cabin Electricals & AC Functionality</label>
                            <select id="pdiInterior" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500 font-bold">
                                <option value="Passed">Passed (Chilling AC, zero scanning fault alerts)</option>
                                <option value="Attention">Attention Required (Switch error / display wear)</option>
                            </select>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-slate-400 pl-1 uppercase tracking-wider text-[10px]">Suspension Dynamics & Tire Tread Depth</label>
                            <select id="pdiTyres" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500 font-bold">
                                <option value="Passed">Passed (Healthy tread life, no rattle)</option>
                                <option value="Attention">Attention Required (Tire replacements needed)</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-1.5 pt-2">
                        <label class="text-slate-400 pl-1 uppercase tracking-wider text-[10px]">Inspector Field Log Evaluation Notes Summary</label>
                        <textarea id="inspectorNotes" rows="3" placeholder="Describe body scratches, test-drive performance details, or general notes clearly..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500 text-xs font-semibold"></textarea>
                    </div>
                </div>

                <div class="flex justify-between">
                    <button type="button" onclick="navigateWizardStep(1)" class="bg-slate-900 border border-slate-800 text-slate-400 hover:text-white font-bold text-xs px-6 py-3.5 rounded-xl transition-all uppercase tracking-wider cursor-pointer">
                        ← Back to Basics
                    </button>
                    <button type="button" onclick="navigateWizardStep(3)" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs px-6 py-3.5 rounded-xl transition-all shadow-lg shadow-indigo-600/10 uppercase tracking-wider cursor-pointer">
                        Proceed to Media Profiles →
                    </button>
                </div>
            </div>

            <div id="formSection-step3" class="form-step-block space-y-6 hidden">
                <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 space-y-4">
                    <h3 class="text-base font-bold text-white border-b border-slate-800 pb-3">Digital Media Proof Capture</h3>
                    
                    <div class="space-y-4 text-xs font-semibold">
                        <div class="space-y-2">
                            <label class="text-slate-400 pl-1 uppercase tracking-wider text-[10px]">Capture / Upload Vehicle Photo</label>
                            
                            <input type="file" id="carImageFile" accept="image/*" capture="environment" class="hidden" onchange="processCapturedPhoto(this)">
                            
                            <div type="button" onclick="document.getElementById('carImageFile').click()" class="w-full h-40 border-2 border-dashed border-slate-800 hover:border-indigo-500 rounded-2xl flex flex-col items-center justify-center gap-2 cursor-pointer transition-all bg-slate-950/50 group">
                                <svg class="w-8 h-8 text-slate-500 group-hover:text-indigo-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                <span class="text-slate-400 group-hover:text-white transition-colors text-xs font-bold">Click to Open Camera or Photo Gallery</span>
                                <span class="text-[10px] text-slate-600 font-bold tracking-wide" id="uploadStatusText">No file selected</span>
                            </div>

                            <input type="hidden" id="carImage" value="">
                        </div>

                        <div id="previewContainer" class="hidden w-full rounded-2xl overflow-hidden border border-slate-800 bg-slate-950 p-2">
                            <img id="imagePreview" src="" class="w-full h-48 object-cover rounded-xl">
                        </div>
                    </div>
                </div>

                <div class="flex justify-between">
                    <button type="button" onclick="navigateWizardStep(2)" class="bg-slate-900 border border-slate-800 text-slate-400 hover:text-white font-bold text-xs px-6 py-3.5 rounded-xl transition-all uppercase tracking-wider cursor-pointer">
                        ← Back to Checklist
                    </button>
                    <button type="submit" id="submitTerminalBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs px-8 py-3.5 rounded-xl transition-all shadow-lg shadow-emerald-600/10 uppercase tracking-wider cursor-pointer">
                        🚀 Deploy Report to Admin Queue
                    </button>
                </div>
            </div>

        </form>
    </main>

    <script>
        const SUPABASE_URL = "https://vzksbpiscgmplgbsgozi.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Hm8jYH8uEtR29suCqldB-A_Lf5miwL1"; 

        // Multi-Step Tab View Navigation Router Engine
        function navigateWizardStep(targetStepNumber) {
            document.querySelectorAll('.form-step-block').forEach(section => section.classList.add('hidden'));
            
            const inactivePillStyle = "bg-slate-950 text-slate-500 border border-slate-900 px-4 py-2 rounded-xl transition-all flex-1 text-center mx-1";
            document.getElementById('pill-step1').className = inactivePillStyle;
            document.getElementById('pill-step2').className = inactivePillStyle;
            document.getElementById('pill-step3').className = inactivePillStyle;

            document.getElementById(`formSection-step${targetStepNumber}`).classList.remove('hidden');
            document.getElementById(`pill-step${targetStepNumber}`).className = "step-pill-active border border-slate-700 px-4 py-2 rounded-xl transition-all flex-1 text-center mx-1";
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Photo Processing and Base64 Compression Engine
        function processCapturedPhoto(input) {
            const file = input.files[0];
            const statusText = document.getElementById("uploadStatusText");
            const previewContainer = document.getElementById("previewContainer");
            const imagePreview = document.getElementById("imagePreview");
            const hiddenImageInput = document.getElementById("carImage");

            if (!file) return;

            statusText.innerText = "Processing & compressing image data matrix...";
            statusText.className = "text-[10px] text-indigo-400 font-bold";

            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function () {
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");

                    const maxDimension = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxDimension) {
                            height *= maxDimension / width;
                            width = maxDimension;
                        }
                    } else {
                        if (height > maxDimension) {
                            width *= maxDimension / height;
                            height = maxDimension;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    const base64DataString = canvas.toDataURL("image/jpeg", 0.7);
                    
                    hiddenImageInput.value = base64DataString;
                    imagePreview.src = base64DataString;
                    previewContainer.classList.remove("hidden");
                    
                    statusText.innerText = `✅ Successfully Loaded: ${file.name}`;
                    statusText.className = "text-[10px] text-emerald-400 font-bold";
                };
            };
            reader.readAsDataURL(file);
        }

        // Mass-Form Data Assembly & Serialization Transmit Handshake Pipeline
        async function handleFormSubmissionPipeline(event) {
            event.preventDefault();

            const submitBtn = document.getElementById("submitTerminalBtn");
            const photoContent = document.getElementById("carImage").value;
            
            if(!photoContent) {
                alert("Operation Terminated: You must snap or choose a vehicle photo profile before deploying.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "TRANSMITTING DATA METRIC VAULT...";

            // FIXED: Automatically maps 0 value into price slot to satisfy not-null constraints seamlessly
            const packedPayloadNode = {
                id: document.getElementById("carId").value.trim(),
                name: document.getElementById("carName").value.trim(),
                variant: document.getElementById("carVariant").value.trim(),
                year: parseInt(document.getElementById("carYear").value),
                kms: parseFloat(document.getElementById("carKms").value),
                rto: document.getElementById("carRto").value.trim(),
                fuel: document.getElementById("carFuel").value,
                transmission: document.getElementById("carTransmission").value,
                owners: parseInt(document.getElementById("carOwners").value),
                color: document.getElementById("carColor").value.trim(),
                pdi_engine_status: document.getElementById("pdiEngine").value,
                pdi_structural_status: document.getElementById("pdiStructure").value,
                pdi_interior_status: document.getElementById("pdiInterior").value,
                pdi_tyres_status: document.getElementById("pdiTyres").value,
                inspector_notes: document.getElementById("inspectorNotes").value.trim(),
                image: photoContent,
                price: 0, // Default baseline placeholder initialization parameter
                status: "Available"
            };

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/vehicles`, {
                    method: "POST",
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify(packedPayloadNode)
                });

                if (response.ok) {
                    alert("🎯 SUCCESS!\nEvaluation report packed and injected successfully into the cloud database rows.");
                    document.getElementById("inspectionReportForm").reset();
                    document.getElementById("previewContainer").classList.add("hidden");
                    navigateWizardStep(1);
                } else {
                    const errorDetail = await response.text();
                    alert(`❌ TRANSMISSION REJECTED:\nEnsure the Car ID is completely unique.\n\nLog Details: ${errorDetail}`);
                }
            } catch (err) {
                console.error(err);
                alert("Network communication timeout fault occurred.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "🚀 Deploy Report to Admin Queue";
            }
        }
    </script>
</body>
</html>
