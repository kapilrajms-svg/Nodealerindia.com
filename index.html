<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoDealerIndia | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <!-- STEALTH MAINTENANCE CONTROL INTERFACE -->
    <div id="maintenanceOverlay" class="max-w-md w-full text-center space-y-6">
        <div class="inline-flex items-center gap-2 bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide animate-pulse">
            🛠️ Upgrading Digital Showroom
        </div>
        <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-white">NoDealer<span class="text-indigo-500">India</span></h1>
        <p class="text-sm text-slate-400 font-medium px-4">We are running final mechanical system sync checks. The certified peer-to-peer fleet opens to the public by the end of this month.</p>
        <div class="pt-2">
            <span class="text-[10px] font-bold text-slate-600 uppercase tracking-widest block">Launch Phase 1</span>
        </div>
    </div>

    <!-- LIVE ROUTING ENGINE LOGIC -->
    <script>
        // LAUNCH DAY TOGGLE CONTROL SWITCH
        // Change 'false' to 'true' on launch morning to instantly take your entire business live!
        const IS_LAUNCH_DAY_LIVE = false;

        function runAutomatedTrafficRouter() {
            if (!IS_LAUNCH_DAY_LIVE) return; // Keep maintenance overlay visible in stealth mode

            // Smart device profile scanner
            const userAgentString = navigator.userAgent || navigator.vendor || window.opera;
            const isMobileDevice = /android|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(userAgentString.toLowerCase());

            if (isMobileDevice) {
                // Instantly redirect mobile/Instagram bio visitors into your fast app view
                window.location.replace("app.html");
            } else {
                // Instantly send desktop visitors into your large showroom overview
                window.location.replace("showroom.html");
            }
        }

        // Execute routing scans as soon as page assets initialize
        window.addEventListener("DOMContentLoaded", runAutomatedTrafficRouter);
    </script>
</body>
</html>
