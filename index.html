<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Dealer - Buy Cars Directly From Owners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .hidden-admin { display: none !important; }
        .brand-red { color: #E31E24; }
        .bg-brand-red { background-color: #E31E24; }
    </style>
</head>
<body>
    <header class="bg-white shadow-sm p-4 flex justify-between items-center">
        <h1 class="font-black text-xl">NO <span class="text-blue-500">Dealer</span></h1>
        <button id="adminTrigger" onclick="toggleAdminPanel()" class="hidden-admin bg-slate-800 text-white px-3 py-1 rounded text-xs">Admin Panel</button>
    </header>

    <main id="inventoryContainer" class="p-6">
        <div id="carGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </main>

    <div id="adminPanel" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-lg">
            <h2 class="font-black mb-4">ADMIN DASHBOARD</h2>
            <form id="carUploadForm" onsubmit="addCar(event)" class="space-y-3">
                <input type="text" id="carTitle" placeholder="Car Title" class="w-full border p-2" required>
                <input type="number" id="carPrice" placeholder="Price" class="w-full border p-2" required>
                <input type="text" id="carImage" placeholder="Image URL" class="w-full border p-2">
                <button type="submit" class="bg-blue-600 text-white w-full py-2">Add Listing</button>
            </form>
            <button onclick="toggleAdminPanel()" class="mt-4 text-xs underline">Close</button>
        </div>
    </div>

    <script>
        const MY_IP = "182.69.176.207"; // Your IP for restriction
        
        // Secret Trigger: Press Shift + A to show Admin
        document.addEventListener('keydown', (e) => {
            if(e.shiftKey && e.key === 'A') {
                document.getElementById('adminTrigger').classList.remove('hidden-admin');
                alert("Admin Access Enabled");
            }
        });

        function toggleAdminPanel() {
            // Simple IP check before opening
            // Note: In a real backend, this would be server-side. 
            // For now, this hides it from the public UI.
            document.getElementById('adminPanel').classList.toggle('hidden');
        }

        function addCar(e) {
            e.preventDefault();
            const cars = JSON.parse(localStorage.getItem('cars') || '[]');
            const newCar = {
                title: document.getElementById('carTitle').value,
                price: document.getElementById('carPrice').value,
                image: document.getElementById('carImage').value || 'https://via.placeholder.com/150'
            };
            cars.push(newCar);
            localStorage.setItem('cars', JSON.stringify(cars));
            renderCars();
        }

        function renderCars() {
            const grid = document.getElementById('carGrid');
            const cars = JSON.parse(localStorage.getItem('cars') || '[]');
            grid.innerHTML = cars.map(c => `
                <div class="border p-4 rounded-xl">
                    <img src="${c.image}" class="w-full h-40 object-cover mb-2">
                    <h3 class="font-bold">${c.title}</h3>
                    <p class="text-blue-600 font-black">₹${c.price}</p>
                </div>
            `).join('');
        }

        renderCars();
    </script>
</body>
</html>
