<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Dealer - Buy Cars Directly From Owners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Open Sans', sans-serif; background-color: #f8fafc; }
        h1, h2, h3, h4, .font-heading { font-family: 'Montserrat', sans-serif; }
        .brand-red { color: #E31E24; }
        .bg-brand-red { background-color: #E31E24; }
        .bg-brand-blue { background-color: #1E88E5; }
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 0.4s ease-in-out; }
        .start-btn { background: linear-gradient(145deg, #ef4444, #E31E24); box-shadow: 0 0 30px rgba(227, 30, 36, 0.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 25px rgba(227, 30, 36, 0.5); } 50% { transform: scale(1.03); box-shadow: 0 0 40px rgba(227, 30, 36, 0.8); } 100% { transform: scale(1); box-shadow: 0 0 25px rgba(227, 30, 36, 0.5); } }
    </style>
</head>
<body class="overflow-hidden text-slate-800">

    <div id="preloader">
        <div class="text-center p-4 max-w-sm flex flex-col items-center w-full">
            <h2 class="text-white text-2xl font-extrabold mb-12">NO <span class="text-blue-500">Dealer</span></h2>
            <button onclick="startEngine()" class="start-btn text-white font-black text-lg w-28 h-28 rounded-full border-4 border-slate-900">START</button>
        </div>
    </div>

    <div id="main-content" class="opacity-0 transition-opacity duration-300">
        <main class="max-w-7xl mx-auto px-4 py-12">
            <div id="carGrid" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </main>
    </div>

    <script>
        // Core Functionality Logic
        function startEngine() {
            document.getElementById('preloader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('preloader').style.display = 'none';
                document.body.classList.remove('overflow-hidden');
                document.getElementById('main-content').classList.remove('opacity-0');
            }, 400);
        }

        let inventory = JSON.parse(localStorage.getItem('nodealer_cars')) || [];

        function renderInventory() {
            const grid = document.getElementById('carGrid');
            grid.innerHTML = inventory.map(car => `
                <div class="bg-white rounded-xl shadow border border-slate-100 p-4">
                    <h3 class="font-bold">${car.title}</h3>
                    <p class="text-red-600 font-black">₹${car.price}</p>
                </div>
            `).join('');
        }

        function handleCarUpload(e) {
            e.preventDefault();
            const newCar = {
                title: document.getElementById('carTitle').value,
                price: document.getElementById('carPrice').value
            };
            inventory.push(newCar);
            localStorage.setItem('nodealer_cars', JSON.stringify(inventory));
            renderInventory();
            alert('Car added successfully!');
        }

        function executeAdminLogin() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            if(pass === "admin123") {
                document.getElementById('adminAuthView').classList.add('hidden');
                document.getElementById('adminWorkspaceView').classList.remove('hidden');
            } else {
                alert("Invalid Credentials");
            }
        }

        // Initialize
        renderInventory();
    </script>
</body>
</html>
