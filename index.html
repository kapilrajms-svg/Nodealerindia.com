<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Open Sans', sans-serif; background-color: #f8fafc; }

        .brand-red { color: #E31E24; }
        .bg-brand-red { background-color: #E31E24; }
        .bg-brand-blue { background-color: #1E88E5; }
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            z-index: 99999; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            transition: all 0.7s cubic-bezier(0.645, 0.045, 0.355, 1);
        }
        .start-btn {
            background: linear-gradient(145deg, #ef4444, #E31E24);
            box-shadow: 0 0 40px rgba(227, 30, 36, 0.6);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(227, 30, 36, 0.6); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(227, 30, 36, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 30px rgba(227, 30, 36, 0.6); }
        }
    </style>
</head>
