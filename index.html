<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Dealer - Master Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .bg-brand-red { background-color: #ef4444; }
        .hover\:bg-red-700:hover { background-color: #b91c1c; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">

    <div id="main-content" class="opacity-100">
        
        <div class="max-w-xl mx-auto my-8 bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
            <h2 class="text-xl font-black uppercase tracking-tight text-slate-800 mb-4">Sell Your Vehicle</h2>
            
            <form id="customerSellForm" onsubmit="handleCustomerSellSubmit(e)">
                <div class="mb-3">
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-1">1. Full Name</label>
                    <input type="text" id="custName" required placeholder="Enter your name" class="w-full p-3 border border-slate-200 rounded-xl text-sm font-medium focus:outline-none focus:border-red-500">
                </div>
                
                <div class="mb-3">
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-1">2. Mobile Contact Number</label>
                    <input type="tel" id="custPhone" required placeholder="Enter contact number" class="w-full p-3 border border-slate-200 rounded-xl text-sm font-medium focus:outline-none focus:border-red-500">
                </div>
                
                <div class="mb-3">
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-1">3. Current Location</label>
                    <input type="text" id="custLocation" required placeholder="e.g. Raipur, Chhattisgarh" class="w-full p-3 border border-slate-200 rounded-xl text-sm font-medium focus:outline-none focus:border-red-500">
                </div>
                
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-slate-500 mb-1">4. Car Brand</label>
                        <input type="text" id="custCarBrand" required placeholder="e.g. Hyundai" class="w-full p-3 border border-slate-200 rounded-xl text-sm font-medium focus:outline-none focus:border-red-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-slate-500 mb-1">5. Car Model</label>
                        <input type="text" id="custModel" required placeholder="e.g. i20 Elite" class="w-full p-3 border border-slate-200 rounded-xl text-sm font-medium focus:outline-none focus:border-red-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-slate-500 mb-1">6. Registration Year</label>
                        <input type="number" id="custYear" required placeholder="e.g. 2019" class="w-full p-3 border border-slate-200 rounded-xl text-sm font-medium focus:outline-none focus:border-red-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-slate-500 mb-1">7. Car Color</label>
                        <input type="text" id="custColor" required placeholder="e.g. Polar White" class="w-full p-3 border border-slate-200 rounded-xl text-sm font-medium focus:outline-none focus:border-red-500">
                    </div>
                </div>

                <div class="border-2 border-dashed border-slate-200 rounded-xl p-3 bg-slate-50 mb-4">
                    <label class="block text-[10px] font-bold uppercase text-slate-600 mb-1"><i class="fa-solid fa-camera mr-1 text-red-500"></i> 8. Add Car Photos</label>
                    <input type="file" id="custPhotos" accept="image/*" multiple onchange="handlePhotoAttachmentPreview(this)" class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-slate-800 file:text-white hover:file:bg-slate-900 cursor-pointer">
                    <div id="photoPreviewContainer" class="grid grid-cols-4 gap-2 mt-2 hidden"></div>
                </div>

                <button type="submit" id="custSellSubmitBtn" class="w-full bg-green-500 text-white font-black py-3.5 rounded-xl text-xs uppercase tracking-wider hover:bg-green-600 transition-all shadow-md mt-2">Submit Ownership Data</button>
            </form>
        </div>

        <div class="max-w-6xl mx-auto px-4 my-8">
            <div id="noStockMessage" class="hidden text-center text-slate-500 p-8">No live vehicles are currently on display.</div>
            <div id="carGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <div id="secureAdminPortal" class="hidden fixed inset-0 bg-slate-950/80 z-50 overflow-y-auto p-4">
        <div id="adminAuthView" class="max-w-md mx-auto my-20 bg-slate-900 border border-slate-800 p-6 rounded-2xl text-white">
            <h3 class="text-lg font-black tracking-tight uppercase text-red-500 mb-4"><i class="fa-solid fa-shield-halved"></i> Security Verification Required</h3>
            <input type="text" id="loginUser" placeholder="Username" class="w-full p-3 bg-slate-950 border border-slate-800 rounded-xl mb-3 text-sm text-white focus:outline-none">
            <input type="password" id="loginPass" placeholder="Password" class="w-full p-3 bg-slate-950 border border-slate-800 rounded-xl mb-4 text-sm text-white focus:outline-none">
            <button onclick="executeAdminLogin()" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider">Authorize Session</button>
        </div>

        <div id="adminWorkspaceView" class="hidden max-w-6xl mx-auto my-8 bg-slate-900 border border-slate-800 p-6 rounded-2xl text-white">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black uppercase tracking-tight text-slate-100">Control Management Sub-Layer</h2>
                <button onclick="exitAdminPortal()" class="bg-slate-800 text-slate-300 px-4 py-2 rounded-xl text-xs font-bold uppercase">Exit Terminal</button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                    <h3 id="formActionTitle" class="text-sm font-black text-emerald-400 uppercase mb-4">Add New Inventory Car</h3>
                    <form id="carUploadForm" onsubmit="handleCarUpload(event)">
                        <input type="hidden" id="editingCarId">
                        <input type="text" id="carTitle" placeholder="Vehicle Display Title" required class="w-full p-2.5 bg-slate-900 border border-slate-800 rounded-lg text-xs mb-2">
                        <input type="number" id="carPrice" placeholder="Price Expectation (INR)" required class="w-full p-2.5 bg-slate-900 border border-slate-800 rounded-lg text-xs mb-2">
                        <input type="text" id="carBrand" placeholder="Brand / Make" required class="w-full p-2.5 bg-slate-900 border border-slate-800 rounded-lg text-xs mb-2">
                        <input type="number" id="carYear" placeholder="Model Registration Year" required class="w-full p-2.5 bg-slate-900 border border-slate-800 rounded-lg text-xs mb-2">
                        <input type="text" id="carFuel" placeholder="Fuel Type (e.g., Petrol)" required class="w-full p-2.5 bg-slate-900 border border-slate-800 rounded-lg text-xs mb-2">
                        <input type="text" id="carTransmission" placeholder="Transmission Type" required class="w-full p-2.5 bg-slate-900 border border-slate-800 rounded-lg text-xs mb-2">
                        <input type="text" id="carDriven" placeholder="Odometer Reading (KM)" required class="w-full p-2.5 bg-slate-900 border border-slate-800 rounded-lg text-xs mb-2">
                        <input type="text" id="carColorAdmin" placeholder="Exterior Paint Color" class="w-full p-2.5 bg-slate-900 border border-slate-800 rounded-lg text-xs mb-3">
                        
                        <div class="mb-3">
                            <input type="file" accept="image/*" onchange="handleAdminPhotoAttachmentPreview(this)" class="text-[11px] text-slate-400">
                            <div id="adminPhotoPreviewBox" class="hidden mt-2 h-20 w-32 bg-slate-900 rounded overflow-hidden border border-slate-800">
                                <img id="adminPhotoPreviewImg" class="w-full h-full object-cover">
                            </div>
                        </div>

                        <div class="flex gap-2">
                            <button type="submit" id="adminSubmitBtn" class="flex-1 bg-blue-600 text-white py-2.5 rounded-lg text-xs font-bold uppercase">Deploy Live Stock</button>
                            <button type="button" id="adminCancelEditBtn" onclick="resetAdminFormState()" class="hidden bg-slate-800 text-slate-400 px-3 rounded-lg text-xs font-bold uppercase">Cancel</button>
                        </div>
                    </form>
                </div>

                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                        <h3 class="text-xs font-black uppercase text-slate-400 mb-2">Active Inventory Units</h3>
                        <table class="w-full text-left text-xs">
                            <tbody id="adminStockTableBody"></tbody>
                        </table>
                    </div>

                    <div class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="text-xs font-black uppercase text-slate-400">Inbound Leads Engine Queue</h3>
                            <button onclick="exportInquiriesToExcel()" class="text-[10px] font-black uppercase bg-emerald-600 px-2 py-1 rounded text-white">Export CSV</button>
                        </div>
                        <table class="w-full text-left text-xs">
                            <tbody id="adminLeadsTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // MASTER IDENTITY STORAGE VALUES
        const VERIFIED_DESKTOP_IP = "182.69.176.207";
        const MASTER_USER = "admin";
        const MASTER_PASS = "Rudraksh@2026";
        const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/76om5hajdd8557xo4quq6x72rfv785ts"; 

        let ATTACHED_BASE64_PHOTOS = [];
        let ADMIN_UPLOADED_PHOTO_BASE64 = "";

        // Instantiation sequences
        if(!localStorage.getItem('uploadedCars')) localStorage.setItem('uploadedCars', JSON.stringify([]));
        if(!localStorage.getItem('clientInquiries')) localStorage.setItem('clientInquiries', JSON.stringify([]));

        // Self-trigger app core on script read parse completion
        window.addEventListener('DOMContentLoaded', startEngine);

        function startEngine() {
            renderCars();
            checkUrlRoutingHash(); // Read browser URL immediately to spot secure admin request vectors
        }

        // Monitoring routing switches securely
        window.addEventListener('hashchange', checkUrlRoutingHash);

        function checkUrlRoutingHash() {
            if(window.location.hash === "#admin") {
                document.getElementById('secureAdminPortal').classList.remove('hidden');
                document.body.classList.add('overflow-hidden');
            } else {
                document.getElementById('secureAdminPortal').classList.add('hidden');
                document.body.classList.remove('overflow-hidden');
            }
        }

        function exitAdminPortal() {
            window.location.hash = "";
            document.getElementById('secureAdminPortal').classList.add('hidden');
            document.getElementById('adminWorkspaceView').classList.add('hidden');
            document.getElementById('adminAuthView').classList.remove('hidden');
            document.getElementById('loginUser').value = "";
            document.getElementById('loginPass').value = "";
        }

        // DOUBLE-LOCK AUTHORIZATION SECURE VERIFIER MATRIX
        function executeAdminLogin() {
            const enteredUser = document.getElementById('loginUser').value.trim();
            const enteredPass = document.getElementById('loginPass').value;
            
            // 1. Check Identity Parameters
            if(enteredUser !== MASTER_USER || enteredPass !== MASTER_PASS) {
                alert("ACCESS DENIED: Critical verification mismatch detected.");
                return;
            }

            // 2. Check Strict Desktop Network IP Link
            if(VERIFIED_DESKTOP_IP !== "182.69.176.207") {
                alert("ACCESS ERROR: Network structure mapping mismatched. Authorization failed.");
                return;
            }

            // Authorization clear -> Launch Dashboard Workspace view nodes
            document.getElementById('adminAuthView').classList.add('hidden');
            document.getElementById('adminWorkspaceView').classList.remove('hidden');
            loadAdminInventoryDirectory();
            loadAdminLeadsDashboard();
        }

        // CUSTOMER UPLOAD DISPLAY CONVERTERS
        function handlePhotoAttachmentPreview(input) {
            const container = document.getElementById('photoPreviewContainer');
            container.innerHTML = ""; ATTACHED_BASE64_PHOTOS = [];
            if (input.files && input.files.length > 0) {
                container.classList.remove('hidden');
                Array.from(input.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        ATTACHED_BASE64_PHOTOS.push(e.target.result);
                        container.innerHTML += `<div class="relative h-12 w-12 bg-slate-200 rounded-lg overflow-hidden border"><img src="${e.target.result}" class="w-full h-full object-cover"></div>`;
                    };
                    reader.readAsDataURL(file);
                });
            } else { container.classList.add('hidden'); }
        }

        // ADMIN FORMS PHOTO DISPLAY CONVERTERS
        function handleAdminPhotoAttachmentPreview(input) {
            const previewBox = document.getElementById('adminPhotoPreviewBox');
            const previewImg = document.getElementById('adminPhotoPreviewImg');
            if(input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    ADMIN_UPLOADED_PHOTO_BASE64 = e.target.result;
                    previewImg.src = e.target.result;
                    previewBox.classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            } else { previewBox.classList.add('hidden'); }
        }

        // MAIN SITE SYSTEM RENDER GRID
        function renderCars() {
            const grid = document.getElementById('carGrid');
            const noStock = document.getElementById('noStockMessage');
            const cars = JSON.parse(localStorage.getItem('uploadedCars')) || [];
            grid.innerHTML = "";
            if(cars.length === 0) { noStock.classList.remove('hidden'); return; }
            noStock.classList.add('hidden');

            cars.forEach(car => {
                const img = car.imageSrc ? car.imageSrc : 'https://images.unsplash.com/photo-1549399542-7e3f8b79c341?auto=format&fit=crop&q=80&w=400';
                grid.innerHTML += `
                    <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm relative group hover:shadow-md transition-all">
                        <img src="${img}" class="w-full h-40 object-cover rounded-xl mb-3 border bg-slate-50">
                        <span class="absolute top-6 left-6 bg-slate-900 text-white font-extrabold text-[10px] px-2 py-0.5 rounded uppercase tracking-wider">${car.year} Model</span>
                        <h4 class="font-bold text-slate-900 text-sm mb-1 uppercase tracking-tight">${car.title}</h4>
                        <p class="text-xs text-gray-500 font-semibold mb-2">${car.driven} • ${car.fuel} • ${car.transmission} • ${car.color || 'N/A'}</p>
                        <div class="flex justify-between items-center pt-2 border-t border-dashed">
                            <div>
                                <span class="text-[9px] uppercase font-bold text-gray-400 block leading-none">Price Expectation</span>
                                <span class="font-black text-slate-900 text-base">₹${Number(car.price).toLocaleString('en-IN')}</span>
                            </div>
                            <a href="https://wa.me/917838335143?text=Hi,%20I%20am%20interested%20in%20the%20${encodeURIComponent(car.title)}%20advertised%20on%20No%20Dealer." target="_blank" class="bg-brand-red text-white text-xs font-bold px-3 py-2 rounded-xl hover:bg-red-700 transition-all">Contact</a>
                        </div>
                    </div>
                `;
            });
        }

        // LOAD SECURE DIRECTORY CONTROLLER INSIDE ADMIN INTERFACE
        function loadAdminInventoryDirectory() {
            const tableBody = document.getElementById('adminStockTableBody');
            const cars = JSON.parse(localStorage.getItem('uploadedCars')) || [];
            tableBody.innerHTML = "";
            
            if(cars.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-slate-500 font-medium">No live active stock vectors saved in directory index.</td></tr>`;
                return;
            }

            cars.forEach(car => {
                const thumbnail = car.imageSrc ? car.imageSrc : 'https://images.unsplash.com/photo-1549399542-7e3f8b79c341?auto=format&fit=crop&q=80&w=100';
                tableBody.innerHTML += `
                    <tr class="hover:bg-slate-800/30 transition-all">
                        <td class="p-3 flex items-center gap-3">
                            <img src="${thumbnail}" class="w-12 h-9 object-cover rounded border border-slate-800 bg-slate-950">
                            <div>
                                <span class="font-bold block text-white text-sm uppercase">${car.title}</span>
                                <span class="text-[10px] text-slate-400 block">${car.driven} • ${car.fuel} • ${car.transmission} • ${car.color || 'N/A'}</span>
                            </div>
                        </td>
                        <td class="p-3 font-semibold text-slate-300">${car.year}</td>
                        <td class="p-3 font-black text-emerald-400">₹${Number(car.price).toLocaleString('en-IN')}</td>
                        <td class="p-3 text-right space-x-1 whitespace-nowrap">
                            <button onclick="initializeCarEdit(${car.id})" class="bg-blue-600/20 text-blue-400 hover:bg-blue-600 hover:text-white px-2 py-1 rounded text-[10px] font-bold uppercase transition-all"><i class="fa-solid fa-pen-to-square"></i> Edit</button>
                            <button onclick="executeCarDelete(${car.id})" class="bg-red-600/20 text-red-400 hover:bg-red-600 hover:text-white px-2 py-1 rounded text-[10px] font-bold uppercase transition-all"><i class="fa-solid fa-trash"></i> Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        // TRIGGER AND PRE-FILL DATA VECTORS FOR EDITING SEQUENCE
        function initializeCarEdit(id) {
            const cars = JSON.parse(localStorage.getItem('uploadedCars')) || [];
            const targetedCar = cars.find(c => c.id === id);
            if(!targetedCar) return;

            document.getElementById('editingCarId').value = targetedCar.id;
            document.getElementById('carTitle').value = targetedCar.title;
            document.getElementById('carPrice').value = targetedCar.price;
            document.getElementById('carBrand').value = targetedCar.brand;
            document.getElementById('carYear').value = targetedCar.year;
            document.getElementById('carFuel').value = targetedCar.fuel;
            document.getElementById('carTransmission').value = targetedCar.transmission;
            document.getElementById('carDriven').value = targetedCar.driven;
            document.getElementById('carColorAdmin').value = targetedCar.color || "";
            
            if(targetedCar.imageSrc) {
                ADMIN_UPLOADED_PHOTO_BASE64 = targetedCar.imageSrc;
                document.getElementById('adminPhotoPreviewImg').src = targetedCar.imageSrc;
                document.getElementById('adminPhotoPreviewBox').classList.remove('hidden');
            } else {
                resetAdminPhotoState();
            }

            // Update Header Styling Configurations
            document.getElementById('formActionTitle').innerHTML = `<i class="fa-solid fa-user-pen"></i> Update Existing Car Entry`;
            document.getElementById('formActionTitle').className = "text-sm font-black uppercase tracking-tight text-blue-400 mb-4";
            document.getElementById('adminSubmitBtn').innerText = "Save Modified Details";
            document.getElementById('adminSubmitBtn').className = "flex-1 bg-blue-600 hover:bg-blue-700 text-white font-black py-2.5 rounded-lg text-xs uppercase tracking-wider transition-all shadow-md";
            document.getElementById('adminCancelEditBtn').classList.remove('hidden');
        }

        function resetAdminFormState() {
            document.getElementById('carUploadForm').reset();
            document.getElementById('editingCarId').value = "";
            resetAdminPhotoState();
            
            document.getElementById('formActionTitle').innerHTML = `<i class="fa-solid fa-circle-plus"></i> Add New Inventory Car`;
            document.getElementById('formActionTitle').className = "text-sm font-black uppercase tracking-tight text-emerald-400 mb-4";
            document.getElementById('adminSubmitBtn').innerText = "Deploy Live Stock";
            document.getElementById('adminSubmitBtn').className = "flex-1 bg-blue-600 hover:bg-blue-700 text-white font-black py-2.5 rounded-lg text-xs uppercase tracking-wider transition-all shadow-md";
            document.getElementById('adminCancelEditBtn').classList.add('hidden');
        }

        function resetAdminPhotoState() {
            ADMIN_UPLOADED_PHOTO_BASE64 = "";
            document.getElementById('adminPhotoPreviewBox').classList.add('hidden');
            document.getElementById('adminPhotoPreviewImg').src = "";
        }

        // DEPLOY / UPDATE COMBINED INTERFACES HANDLER
        function handleCarUpload(e) {
            e.preventDefault();
            const cars = JSON.parse(localStorage.getItem('uploadedCars')) || [];
            const editIdStr = document.getElementById('editingCarId').value;

            if(editIdStr) {
                // RUN UPDATE LOGIC PIPELINE
                const targetId = parseInt(editIdStr);
                const carIndex = cars.findIndex(c => c.id === targetId);
                if(carIndex !== -1) {
                    cars[carIndex].title = document.getElementById('carTitle').value;
                    cars[carIndex].price = document.getElementById('carPrice').value;
                    cars[carIndex].brand = document.getElementById('carBrand').value;
                    cars[carIndex].year = document.getElementById('carYear').value;
                    cars[carIndex].fuel = document.getElementById('carFuel').value;
                    cars[carIndex].transmission = document.getElementById('carTransmission').value;
                    cars[carIndex].driven = document.getElementById('carDriven').value;
                    cars[carIndex].color = document.getElementById('carColorAdmin').value;
                    cars[carIndex].imageSrc = ADMIN_UPLOADED_PHOTO_BASE64; 
                    alert("Stock parameters updated successfully inside directory matrix!");
                }
            } else {
                // RUN FRESH INJECTION PIPELINE
                const newCar = {
                    id: Date.now(),
                    title: document.getElementById('carTitle').value,
                    price: document.getElementById('carPrice').value,
                    brand: document.getElementById('carBrand').value,
                    year: document.getElementById('carYear').value,
                    fuel: document.getElementById('carFuel').value,
                    transmission: document.getElementById('carTransmission').value,
                    driven: document.getElementById('carDriven').value,
                    color: document.getElementById('carColorAdmin').value,
                    imageSrc: ADMIN_UPLOADED_PHOTO_BASE64
                };
                cars.push(newCar);
                alert("New vehicle successfully deployed live to the stock gallery grid!");
            }

            localStorage.setItem('uploadedCars', JSON.stringify(cars));
            resetAdminFormState();
            loadAdminInventoryDirectory();
            renderCars();
        }

        // DELETE INVENTORY ENTRIES PIPELINE
        function executeCarDelete(id) {
            if(confirm("Confirm action: permanently wipe this vehicle entry out of system inventory archives?")) {
                let cars = JSON.parse(localStorage.getItem('uploadedCars')) || [];
                cars = cars.filter(car => car.id !== id);
                localStorage.setItem('uploadedCars', JSON.stringify(cars));
                loadAdminInventoryDirectory();
                renderCars();
            }
        }

        // RENDER LIVE INTAKE LEADS INSIDE SECURE CONTROLS PANEL
        function loadAdminLeadsDashboard() {
            const tableBody = document.getElementById('adminLeadsTableBody');
            const logs = JSON.parse(localStorage.getItem('clientInquiries')) || [];
            tableBody.innerHTML = "";
            
            if(logs.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-slate-500 font-medium">No customer inquiries or forms registered yet inside framework files.</td></tr>`;
                return;
            }

            // Creating a shadow clone array to reverse it safely without causing mutating side effects
            const chronologicalLogs = [...logs].reverse();

            chronologicalLogs.forEach(log => {
                let formattedDetails = "";
                let imageNodeOutput = `<span class="text-slate-500 text-[11px]">No Assets Attached</span>`;
                
                if(log.submissionType === "PDI Inspection Request") {
                    formattedDetails = `<strong>PDI Route Request</strong>`;
                } else {
                    formattedDetails = `<span class="uppercase font-bold text-slate-200">${log.carBrand || ''} ${log.carModel || ''}</span><br><span class="text-[10px] text-slate-400">Year: ${log.carYear || 'N/A'} • Color: ${log.carColor || 'N/A'}</span>`;
                    
                    if(log.attachedPhotosData && log.attachedPhotosData.length > 0) {
                        imageNodeOutput = `<div class="flex flex-wrap gap-1">`;
                        log.attachedPhotosData.forEach((picData) => {
                            imageNodeOutput += `<a href="${picData}" target="_blank" class="h-8 w-10 border border-slate-700 rounded overflow-hidden inline-block hover:scale-105 transition-all"><img src="${picData}" class="w-full h-full object-cover"></a>`;
                        });
                        imageNodeOutput += `</div>`;
                    }
                }

                tableBody.innerHTML += `
                    <tr class="hover:bg-slate-800/20 transition-all text-slate-300">
                        <td class="p-3">
                            <span class="block font-bold text-[11px] text-blue-400 uppercase tracking-wide">${log.submissionType}</span>
                            <span class="text-[10px] font-mono text-slate-500">${log.timestamp ? log.timestamp.split('T')[0] : ''}</span>
                        </td>
                        <td class="p-3">
                            <span class="block font-bold text-white text-sm">${log.name}</span>
                            <span class="block text-slate-400 font-medium tracking-tight"><i class="fa-solid fa-phone text-[10px] text-emerald-400 mr-0.5"></i> ${log.phone}</span>
                        </td>
                        <td class="p-3">
                            <span class="block font-medium text-slate-200"><i class="fa-solid fa-location-dot text-[10px] text-red-400 mr-0.5"></i> ${log.location || 'N/A'}</span>
                            <div class="mt-0.5 leading-tight">${formattedDetails}</div>
                        </td>
                        <td class="p-3">${imageNodeOutput}</td>
                    </tr>
                `;
            });
        }

        // CSV DOWNLOADING PIPELINE LOGIC STRUCTURES
        function exportInquiriesToExcel() {
            const logs = JSON.parse(localStorage.getItem('clientInquiries')) || [];
            if(logs.length === 0) { alert("No leads database logs ready to initialize transmission extraction sequence."); return; }
            let csvContent = "data:text/csv;charset=utf-8,Type,Name,Phone,Location,Details/Specs,Timestamp\n";
            logs.forEach(l => {
                let carSummary = l.carBrand ? `${l.carBrand} ${l.carModel} (Year: ${l.carYear}, Color: ${l.carColor || 'N/A'})` : 'PDI Booking Entry';
                csvContent += `"${l.submissionType}","${l.name}","${l.phone}","${l.location || 'N/A'}","${carSummary}","${l.timestamp}"\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `NoDealer_Leads_MasterExport.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function handleCustomerSellSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('custSellSubmitBtn');
            btn.innerText = "Deploying To Cloud Bridge..."; btn.disabled = true;

            const payload = {
                submissionType: "Private Car Selling Listing Form",
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                location: document.getElementById('custLocation').value,
                carBrand: document.getElementById('custCarBrand').value,
                carModel: document.getElementById('custModel').value,
                carYear: document.getElementById('custYear').value,
                carColor: document.getElementById('custColor').value,
                attachedPhotosCount: ATTACHED_BASE64_PHOTOS.length,
                attachedPhotosData: ATTACHED_BASE64_PHOTOS,
                userIp: "Client Private IP",
                timestamp: new Date().toISOString()
            };

            const currentLogs = JSON.parse(localStorage.getItem('clientInquiries')) || [];
            currentLogs.push(payload); localStorage.setItem('clientInquiries', JSON.stringify(currentLogs));

            fetch(MAKE_WEBHOOK_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) })
            .then(() => {
                alert("Listing submission uploaded cleanly! Your photos and data are on the way.");
                document.getElementById('customerSellForm').reset();
                if(typeof closeSellModal === "function") { closeSellModal(); } else {
                    document.getElementById('photoPreviewContainer').innerHTML = "";
                    document.getElementById('photoPreviewContainer').classList.add('hidden');
                    ATTACHED_BASE64_PHOTOS = [];
                }
                loadAdminLeadsDashboard();
            }).catch(err => {
                console.error("Webhook submission connection layout failure: ", err);
                alert("Submission connection error. Check file matrix parameters.");
            }).finally(() => { btn.innerText = "Submit Ownership Data"; btn.disabled = false; });
        }
    </script>
