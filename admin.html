<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoDealerIndia | Fleet Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-24">

    <!-- Admin Header -->
    <nav class="bg-slate-900 border-b border-slate-800 px-6 py-5 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-xl font-black text-white">NDI // <span class="text-indigo-500">Ops Console</span></span>
                <span class="text-[10px] bg-indigo-500/10 text-indigo-400 font-bold px-2 py-0.5 rounded border border-indigo-500/20 uppercase tracking-widest">Live Inventory Node</span>
            </div>
            <a href="showroom.html" class="text-xs font-bold text-slate-400 hover:text-white transition-colors">← Exit To Showroom</a>
        </div>
    </nav>

    <!-- Main Workspace -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-10 space-y-12">
        
        <!-- Fleet Inventory Control Section -->
        <section class="space-y-6">
            <div>
                <h2 class="text-xl font-bold tracking-tight text-white">Active Inventory Manager</h2>
                <p class="text-xs text-slate-400 mt-1">Direct API overrides for modifying specifications or purging vehicle listing blocks instantly.</p>
            </div>

            <!-- Inventory Grid System -->
            <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-800 bg-slate-950/50 text-[10px] font-bold uppercase tracking-wider text-slate-400">
                                <th class="p-4">Vehicle Details</th>
                                <th class="p-4">Current Price (₹)</th>
                                <th class="p-4">Operational Status</th>
                                <th class="p-4 text-right">Terminal Actions</th>
                            </tr>
                        </thead>
                        <tbody id="adminInventoryTableBody" class="divide-y divide-slate-800 text-xs font-semibold text-slate-300">
                            <!-- Injected by Javascript Engine -->
                            <tr>
                                <td colspan="4" class="p-8 text-center text-slate-500 animate-pulse">Initializing cloud inventory sync hook...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <!-- Core Admin Logic Engine -->
    <script>
        const SUPABASE_URL = "https://vzksbpiscgmplgbsgozi.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Hm8jYH8uEtR29suCqldB-A_Lf5miwL1";

        // Initialize and fetch data on load
        async function syncAdminFleetInventory() {
            const tableBody = document.getElementById("adminInventoryTableBody");
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/vehicles?select=*&order=created_at.desc`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                const fleet = await response.json();
                
                if (fleet.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-slate-500">Zero active vehicles found in database pipeline.</td></tr>`;
                    return;
                }

                tableBody.innerHTML = "";
                fleet.forEach(car => {
                    tableBody.innerHTML += `
                        <tr class="hover:bg-slate-850/40 transition-colors" id="row-${car.id}">
                            <!-- Vehicle Frame Details -->
                            <td class="p-4 flex items-center gap-4">
                                <img src="${car.image}" class="w-14 h-10 object-cover rounded-lg border border-slate-700 bg-slate-950" onerror="this.src='car1.jpg'">
                                <div>
                                    <p class="font-bold text-white text-sm">${car.name}</p>
                                    <p class="text-[10px] text-slate-400">${car.year} • ${car.variant} • ${car.kms} KM</p>
                                </div>
                            </td>
                            
                            <!-- Inline Price Modifier Input -->
                            <td class="p-4">
                                <div class="flex items-center gap-2 max-w-[150px]">
                                    <span class="text-slate-500 font-bold">₹</span>
                                    <input type="number" id="price-input-${car.id}" value="${car.price}" 
                                        class="w-full bg-slate-950 border border-slate-800 rounded-lg px-2 py-1.5 font-mono text-white text-xs focus:outline-none focus:border-indigo-500">
                                </div>
                            </td>
                            
                            <!-- Status Selector Modification Terminal -->
                            <td class="p-4">
                                <select id="status-select-${car.id}" 
                                    class="bg-slate-950 border border-slate-800 rounded-lg px-2 py-1.5 text-xs text-white focus:outline-none focus:border-indigo-500 font-bold">
                                    <option value="Available" ${car.status === 'Available' ? 'selected' : ''}>Available</option>
                                    <option value="Reserved" ${car.status === 'Reserved' ? 'selected' : ''}>Reserved</option>
                                </select>
                            </td>
                            
                            <!-- Destructive Actions Matrix -->
                            <td class="p-4 text-right space-x-2">
                                <button onclick="commitAssetModifications('${car.id}')" 
                                    class="bg-emerald-600/10 hover:bg-emerald-600 text-emerald-400 hover:text-white border border-emerald-500/20 rounded-lg px-3 py-1.5 font-bold transition-all">
                                    Save Updates
                                </button>
                                <button onclick="purgeVehicleListing('${car.id}', '${car.name}')" 
                                    class="bg-rose-600/10 hover:bg-rose-600 text-rose-400 hover:text-white border border-rose-500/20 rounded-lg px-3 py-1.5 font-bold transition-all">
                                    Delete
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
                tableBody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-rose-400">Database Sync Pipeline Connection Failure.</td></tr>`;
            }
        }

        // Action 1: Commit Price/Status Updates Live to Cloud
        async function commitAssetModifications(id) {
            const updatedPrice = document.getElementById(`price-input-${id}`).value;
            const updatedStatus = document.getElementById(`status-select-${id}`).value;

            if(!updatedPrice) { alert("Price target matrix cannot be left blank."); return; }

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/vehicles?id=eq.${id}`, {
                    method: "PATCH",
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify({
                        price: parseFloat(updatedPrice),
                        status: updatedStatus
                    })
                });

                if (response.ok) {
                    alert("✅ Asset matrix updated successfully inside cloud nodes.");
                    syncAdminFleetInventory();
                } else {
                    alert("❌ Operation rejected by database ledger rules.");
                }
            } catch (err) {
                console.error(err);
                alert("Critical API Transmission Error.");
            }
        }

        // Action 2: Completely Purge Listing from Database
        async function purgeVehicleListing(id, vehicleName) {
            const doubleCheckFlag = confirm(`⚠️ DESTRUCTIVE ACTION WARNING:\nAre you absolutely sure you want to permanently erase the ${vehicleName} from the live marketplace matrix? This cannot be undone.`);
            
            if (!doubleCheckFlag) return;

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/vehicles?id=eq.${id}`, {
                    method: "DELETE",
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Prefer": "return=minimal"
                    }
                });

                if (response.ok) {
                    // Instantly clean up UI row seamlessly
                    const UIrow = document.getElementById(`row-${id}`);
                    if(UIrow) UIrow.remove();
                    alert("🗑️ Listing purged completely from network infrastructure.");
                } else {
                    alert("❌ Deletion process rejected by operational rules.");
                }
            } catch (err) {
                console.error(err);
                alert("Critical Deletion Pipeline Interface Interruption.");
            }
        }

        // Initialize execution routines on DOM wake
        window.addEventListener("DOMContentLoaded", syncAdminFleetInventory);
    </script>
</body>
</html>
