<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoDealerIndia | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <!-- Locked State Secure Gate -->
    <div id="adminSecurityLockView" class="bg-slate-800 p-8 rounded-3xl max-w-md w-full border border-slate-700 shadow-2xl space-y-6">
        <div class="text-center space-y-2">
            <h2 class="text-2xl font-black text-white">NoDealerIndia Admin</h2>
            <p class="text-xs text-slate-400 font-medium">Verify your email to manage your inventory upload desk.</p>
        </div>
        <div class="space-y-4">
            <input type="email" id="authGateEmailField" placeholder="Enter Admin Email" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-indigo-500">
            <button onclick="evaluateSecurityGate()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl text-sm transition-all">Verify Access</button>
        </div>
    </div>

    <!-- Active Admin Form Panel (Hidden Initially) -->
    <div id="adminConsoleWorkspace" class="max-w-4xl w-full bg-slate-800 rounded-3xl border border-slate-700 p-8 space-y-8 shadow-2xl hidden">
        <div class="flex items-center justify-between border-b border-slate-700 pb-4">
            <div>
                <h2 class="text-2xl font-black text-white">Upload New Car Listing</h2>
                <p class="text-xs text-slate-400">Logged in as: kapilraj.ms@gmail.com</p>
            </div>
            <a href="index.html" class="text-xs font-bold text-indigo-400 bg-indigo-950/40 border border-indigo-900/50 px-3 py-1.5 rounded-lg">View Live Showroom</a>
        </div>

        <form id="vehicleCaptureForm" onsubmit="commitCarRecordToDatabase(event)" class="grid grid-cols-1 sm:grid-cols-2 gap-6 text-sm text-gray-900">
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Car Model & Brand Name</label>
                <input type="text" id="inName" required placeholder="e.g., Toyota Fortuner" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl p-3 focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Variant / Specifications Details</label>
                <input type="text" id="inVariant" required placeholder="e.g., Sigma4 Automatic Diesel" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl p-3 focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Year of Manufacture</label>
                <input type="number" id="inYear" required placeholder="e.g., 2021" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl p-3 focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Kilometers Driven (KMs)</label>
                <input type="text" id="inKms" required placeholder="e.g., 34,000" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl p-3 focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Fuel Type</label>
                <select id="inFuel" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl p-3 focus:outline-none">
                    <option value="Petrol">Petrol</option>
                    <option value="Diesel">Diesel</option>
                    <option value="CNG">CNG</option>
                    <option value="Electric">Electric</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Gearbox Transmission</label>
                <select id="inTrans" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl p-3 focus:outline-none">
                    <option value="Automatic">Automatic</option>
                    <option value="Manual">Manual</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Ownership Log</label>
                <select id="inOwners" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl p-3 focus:outline-none">
                    <option value="1st Owner">1st Owner</option>
                    <option value="2nd Owner">2nd Owner</option>
                    <option value="3rd Owner">3rd Owner</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Exterior Color</label>
                <input type="text" id="inColor" required placeholder="e.g., Phantom Black" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl p-3 focus:outline-none">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Registration RTO State</label>
                <input type="text" id="inRto" required placeholder="e.g., DL-3C" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl p-3 focus:outline-none">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Insurance Validity</label>
                <input type="text" id="inInsurance" required placeholder="e.g., Comprehensive Valid" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl p-3 focus:outline-none">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Price Evaluation (Numbers only: e.g., 3650000)</label>
                <input type="text" id="inPrice" required placeholder="3650000" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl p-3 focus:outline-none">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Select Placeholder Car Photo</label>
                <select id="inImage" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl p-3 focus:outline-none">
                    <option value="hero.jpg">Default Banner Image</option>
                    <option value="car1.jpg">car1.jpg</option>
                    <option value="car2.jpg">car2.jpg</option>
                    <option value="car3.jpg">car3.jpg</option>
                </select>
            </div>
            <div class="col-span-1 sm:col-span-2">
                <label class="block text-xs font-semibold text-slate-400 mb-1">Instagram Reel Link (Optional)</label>
                <input type="url" id="inReel" placeholder="https://instagram.com/reel/..." class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl p-3 focus:outline-none">
            </div>
            <div class="col-span-1 sm:col-span-2 pt-4">
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl transition-all text-sm">
                    Publish Listing Live on Website
                </button>
            </div>
        </form>
    </div>

    <script>
        const SECURE_ID = "kapilraj.ms@gmail.com";

        function evaluateSecurityGate() {
            const enteredEmail = document.getElementById("authGateEmailField").value.trim().toLowerCase();
            if (enteredEmail === SECURE_ID) {
                document.getElementById("adminSecurityLockView").classList.add("hidden");
                document.getElementById("adminConsoleWorkspace").classList.remove("hidden");
            } else {
                alert("Access Denied: Only kapilraj.ms@gmail.com can log into this system dashboard.");
            }
        }

        function commitCarRecordToDatabase(event) {
            event.preventDefault();

            const newCar = {
                id: "NDI-" + Math.floor(1000 + Math.random() * 9000),
                name: document.getElementById("inName").value.trim(),
                variant: document.getElementById("inVariant").value.trim(),
                year: document.getElementById("inYear").value.trim(),
                kms: document.getElementById("inKms").value.trim(),
                price: document.getElementById("inPrice").value.trim(),
                fuel: document.getElementById("inFuel").value,
                transmission: document.getElementById("inTrans").value,
                owners: document.getElementById("inOwners").value,
                color: document.getElementById("inColor").value.trim(),
                rto: document.getElementById("inRto").value.trim(),
                insurance: document.getElementById("inInsurance").value.trim(),
                reelLink: document.getElementById("inReel").value.trim(),
                image: document.getElementById("inImage").value,
                status: "Available"
            };

            let currentStock = JSON.parse(localStorage.getItem("NODEALER_INVENTORY")) || [];
            currentStock.unshift(newCar);
            localStorage.setItem("NODEALER_INVENTORY", JSON.stringify(currentStock));

            alert(`Successfully posted! ${newCar.name} is now live on your main showroom view.`);
            document.getElementById("vehicleCaptureForm").reset();
        }
    </script>
</body>
</html>
